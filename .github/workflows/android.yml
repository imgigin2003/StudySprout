name: Build Android

# Builds a debug APK in the cloud — no Android Studio needed locally.
# Download the APK from the run's "Artifacts" section when it finishes.

on:
  push:
    branches: [main]
    tags: ["v*"] # a version tag also builds + attaches the APK to the release
  workflow_dispatch: # lets you trigger it manually from the Actions tab

# Needed so the tag build can attach the APK to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: studysprout-android-debug
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # On a version tag, also attach the APK to the (draft) GitHub Release so
      # every platform lives in one place under Releases.
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: frontend/android/app/build/outputs/apk/debug/*.apk
