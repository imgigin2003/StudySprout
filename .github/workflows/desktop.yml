name: Build Desktop

# Builds native desktop installers on each OS's own runner — no local machine of
# that OS required. This is the ONLY way to get a Windows .exe/.msi from a Mac.
#
# - Push a tag like v1.0.0  -> builds all three OSes and publishes a DRAFT GitHub
#   Release with the installers attached (review it, then hit "Publish").
# - Run manually (workflow_dispatch) -> builds and uploads the installers as
#   downloadable run Artifacts, without touching Releases.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Needed so tauri-action can create the GitHub Release on tag builds.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon + Intel (universal)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04 # Linux (.AppImage / .deb)
            args: ""
          - platform: windows-latest # Windows (.exe / .msi)
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build the app (+ draft release on tags)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          # On a tag push this creates/updates a draft release; on manual runs
          # tagName is empty, so tauri-action just builds (no release).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "StudySprout ${{ github.ref_name }}"
          releaseBody: "Desktop installers for macOS, Windows, and Linux. See assets below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers as artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: studysprout-desktop-${{ matrix.platform }}
          path: |
            frontend/src-tauri/target/release/bundle/**/*
            frontend/src-tauri/target/*/release/bundle/**/*
          if-no-files-found: ignore
