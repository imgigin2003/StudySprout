name: Build iOS

# Compiles the iOS app in the cloud on a macOS runner — no Xcode needed locally.
#
# By default this builds an UNSIGNED app (for the simulator). That confirms the
# app compiles and is enough for testing in the simulator. Producing a signed
# .ipa that installs on a real iPhone / TestFlight needs an Apple Developer
# account and signing secrets — see NATIVE_APPS.md for that next step.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch: # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Build unsigned app (simulator)
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload built .app
        uses: actions/upload-artifact@v4
        with:
          name: studysprout-ios-simulator
          path: frontend/ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error
