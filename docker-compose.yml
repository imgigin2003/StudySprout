version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../backend.Dockerfile
    container_name: studysprout-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}

  frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
    container_name: studysprout-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend
