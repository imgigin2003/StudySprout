server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly
    location /assets/ {
        try_files $uri =404;
    }

    location /sounds/ {
        try_files $uri =404;
    }

    # Send all other routes to index.html so React Router can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }
}